name: "Deploy the http backend"
on:
  push:
    branches: ["main"]
jobs:
  builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: "Docker login"
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_PASSWORD}}
      - name: "Build and push"
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./docker/Dockerfile.http
          build-args: |
            DATABASE_URL: ${{secrets.DATABASE_URL}}
          push: true
          tags: whowasthat/todo-app-http:${{github.sha}}

      - name: "Deploy to VM"
        run: |
          touch ~/ssh_key
          echo "${{secrets.SSH_PRIVATE_KEY}}" &> ~/ssh_key
          chmod 700 /home/runner/ssh_key
          ssh -o  StrictHostKeyChecking=no -i ~/ssh_key adarsh@${{secrets.SERVER_IP}} -t "docker stop web || true && docker run --name web -d -p 3000:3000 whowasthat/todo-app-http:${{github.sha}}"
